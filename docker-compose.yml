services:
  csapp:
    # 从本仓库的 csapp-docker 目录构建（这是 2025 更新版）。
    build:
      context: ./csapp-docker
      args:
        # GitHub 下载走加速代理（国内构建必需）。可在 .env 里改 GH_PROXY。
        gh_proxy: ${GH_PROXY:-https://gh-proxy.com/}
    container_name: csapp
    restart: unless-stopped
    environment:
      # 密码从 .env 文件读取，切勿用默认的 csapp
      - PASSWORD=${CSAPP_PASSWORD:?please set CSAPP_PASSWORD in .env}
    volumes:
      # 你的实验代码，容器内路径是 /home/csapp/project
      - ./labs:/home/csapp/project
      # 持久化设置/扩展/自签证书，重启不丢（证书不变，浏览器不必反复放行）
      - csapp-userdata:/home/csapp/.local/share/code-server
      # 挂入配置文件启用自签 HTTPS（cert: true）+ 绑定地址
      - ./deploy/config.yaml:/home/csapp/.config/code-server/config.yaml:ro
    # 直接对公网开放 7777（记得在阿里云安全组放行入站 7777）
    # 访问 https://<公网IP>:7777 ，浏览器首次会提示"不安全"，点继续即可。
    ports:
      - "7777:7777"

volumes:
  csapp-userdata:
