# CS:APP code-server —— 供宿主机现有 nginx 反向代理使用。
# 放到 /etc/nginx/conf.d/csapp.conf，把 YOUR_IP 换成服务器公网 IP。
# certbot 会自动补上 443/SSL 部分并加 HTTP->HTTPS 跳转。
#
# WebSocket 需要 Connection: upgrade，用 map 按需切换：
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name YOUR_IP.sslip.io;

    location / {
        proxy_pass http://127.0.0.1:7777/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # code-server 长连接，避免闲置断开
        proxy_read_timeout 86400;
    }
}
